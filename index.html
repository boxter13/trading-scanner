<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNIPER SCANNER</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.card{
  background:#111827;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

input,button{
  padding:12px;
  margin:5px;
  width:90%;
  border-radius:10px;
  border:none;
}

.buy{color:#22c55e;font-weight:bold}
.nobuy{color:#ef4444}
</style>
</head>

<body>

<h2>🔥 SNIPER SCANNER</h2>

<div class="card">
<input id="apiKey" placeholder="Clé Finnhub">
<button onclick="save()">Sauvegarder</button>
</div>

<div class="card">
<input id="symbol" placeholder="Ajouter (NVDA)">
<button onclick="add()">Ajouter</button>
</div>

<div id="list"></div>

<script>

let symbols = JSON.parse(localStorage.getItem("symbols") || "[]")
let key = ""
let wakeLock = null

// 🔥 écran ON uniquement dans l'app
async function enableWakeLock(){
  try{
    if('wakeLock' in navigator && document.visibilityState === 'visible'){
      wakeLock = await navigator.wakeLock.request('screen')
    }
  }catch(e){}
}

function releaseWakeLock(){
  if(wakeLock){
    wakeLock.release()
    wakeLock = null
  }
}

document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    enableWakeLock()
  } else {
    releaseWakeLock()
  }
})

// 🔥 écran BUY
function triggerBUY(){

  if(navigator.vibrate){
    navigator.vibrate([300,100,300,100,600])
  }

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:80px;
      font-weight:bold;
      color:white;
      animation:flash 1s infinite;
    ">
      BUY

      <button onclick="goBack()" style="
        margin-top:40px;
        font-size:20px;
        padding:15px 25px;
        border-radius:10px;
        border:none;
        background:black;
        color:white;
      ">
        ⬅ RETOUR
      </button>
    </div>

    <style>
      @keyframes flash {
        0% { background:#16a34a; }
        50% { background:#22c55e; }
        100% { background:#16a34a; }
      }
    </style>
  `
}

// 🔥 retour
function goBack(){
  location.reload()
}

// save clé
function save(){
  key = document.getElementById("apiKey").value.trim()

  if(!key){
    alert("Entre une clé API")
    return
  }

  localStorage.setItem("key", key)
  alert("Clé sauvegardée ✅")

  enableWakeLock()
}

// add action
function add(){
  let s = document.getElementById("symbol").value.toUpperCase()

  if(!s) return

  if(!symbols.includes(s)){
    symbols.push(s)
  }

  localStorage.setItem("symbols", JSON.stringify(symbols))

  render()
}

// render
function render(){
  let html = ""
  symbols.forEach(s=>{
    html += `<div class="card" id="${s}">${s} ...</div>`
  })
  document.getElementById("list").innerHTML = html
}

// API
async function getQuote(s){
  let r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${key}`)
  return await r.json()
}

// logique SNIPER
function analyze(q){

  let current = q.c
  let open = q.o
  let high = q.h
  let low = q.l

  let move = ((current - open) / open) * 100

  let nearHigh = (high - current) / (high - low) < 0.25
  let strong = move > 0.3
  let notLate = move < 1.5
  let above = current > open

  if(above && nearHigh && strong && notLate){
    return "BUY"
  }

  return "NO BUY"
}

// scan auto
async function scan(){

  if(!key) return

  for(let s of symbols){

    let q = await getQuote(s)

    let sig = analyze(q)

    if(sig === "BUY"){
      triggerBUY()
      return
    }

    document.getElementById(s).innerHTML =
      `${s} : ${q.c} → <span class="${sig==='BUY'?'buy':'nobuy'}">${sig}</span>`
  }
}

// boucle
setInterval(scan, 10000)

// load
window.onload = () => {

  key = localStorage.getItem("key") || ""
  document.getElementById("apiKey").value = key

  symbols = JSON.parse(localStorage.getItem("symbols") || "[]")

  render()

  enableWakeLock()
}

</script>

</body>
</html>
