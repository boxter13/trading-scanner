<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner PRO++</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}
.card{background:#111827;padding:15px;border-radius:15px;margin:10px}
input,button{padding:10px;margin:5px;width:90%}
.buy{color:#22c55e;font-weight:bold}
.sell{color:#ef4444;font-weight:bold}
.wait{color:orange;font-weight:bold}
</style>
</head>

<body>

<h2>🔥 SCANNER PRO++</h2>

<div class="card">
<input id="apiKey" placeholder="Clé Finnhub">
<button onclick="save()">Sauvegarder</button>
</div>

<div class="card">
<input id="symbol" placeholder="Ajouter action (NVDA)">
<button onclick="add()">Ajouter</button>
</div>

<div id="list"></div>

<script>

let symbols=[]
let key=""

function save(){
  key=document.getElementById("apiKey").value
  alert("OK")
}

function add(){
  let s=document.getElementById("symbol").value.toUpperCase()
  symbols.push(s)
  render()
}

function render(){
  let html=""
  symbols.forEach(s=>{
    html+=`<div class="card" id="${s}">${s} : loading...</div>`
  })
  document.getElementById("list").innerHTML=html
}

async function getQuote(s){
  let r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${key}`)
  return await r.json()
}

function marketFilter(spy,qqq){
  if(spy.c>spy.o && qqq.c>qqq.o) return true
  return false
}

function analyze(price,open,high,low){
  let move=((price-open)/open)*100

  if(move>0.8) return "TROP TARD"
  if(price>open) return "BUY"
  if(price<open) return "NO BUY"
  return "WAIT"
}

async function scan(){

  if(!key) return

  let spy=await getQuote("SPY")
  let qqq=await getQuote("QQQ")

  let marketOk=marketFilter(spy,qqq)

  for(let s of symbols){

    let d=await getQuote(s)

    let signal=analyze(d.c,d.o,d.h,d.l)

    if(!marketOk && signal==="BUY"){
      signal="NO BUY"
    }

    let color="wait"
    if(signal==="BUY") color="buy"
    if(signal==="NO BUY") color="sell"

    document.getElementById(s).innerHTML=
      `${s} : ${d.c} → <span class="${color}">${signal}</span>`
  }
}

setInterval(scan,5000)

</script>

</body>
</html>
